<ion-header>
  <ion-toolbar>
    <ion-title> {{ "pages.newShoppingList.title" | translate }} </ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <text-input
    label="{{ 'pages.newShoppingList.listTitle' | translate }}"
    [(ngModel)]="listTitle"
    type="text"
    autocapitalize="on"
    autocorrect="on"
  ></text-input>

  <br /><br />

  <select-collaborators
    [selectedCollaboratorIds]="selectedCollaboratorIds"
    (selectedCollaboratorIdsChanged)="selectedCollaboratorIds = $event"
  ></select-collaborators>
</ion-content>

<ion-footer class="ion-padding">
  <ion-button expand="block" (click)="save()" [disabled]="!listTitle">
    <ion-icon name="list-outline" slot="start"></ion-icon>
    <ion-label>
      @if (selectedCollaboratorIds.length === 0) {
        <span> {{ "pages.newShoppingList.create" | translate }} </span>
      }
      @if (selectedCollaboratorIds.length > 0) {
        <span> {{ "pages.newShoppingList.createAndShare" | translate }} </span>
      }
    </ion-label>
  </ion-button>
</ion-footer>
