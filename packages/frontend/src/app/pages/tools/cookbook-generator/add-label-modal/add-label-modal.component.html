<ion-header>
  <ion-toolbar>
    <ion-title>{{ "pages.cookbook.addLabel.title" | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <ion-icon name="close" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <select-label (selectedLabelChange)="onSelect($event)"></select-label>
</ion-content>
